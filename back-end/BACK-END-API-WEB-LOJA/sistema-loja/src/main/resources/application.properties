spring.application.name=sistema-loja

# Spring reads the DB_URL environment variable.
# Inside Docker, use jdbc:postgresql://postgres-db:5432/gerenciamento_db.
spring.datasource.url=${DB_URL}

spring.datasource.username=${POSTGRES_USER}

spring.datasource.password=${POSTGRES_PASSWORD}

# TESTE TEMPORARIO
#spring.datasource.username=admin
#spring.datasource.password=suaSenhaSuperSecreta

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# E-mail (SMTP do Gmail). Use uma "senha de app" do Google em MAIL_PASSWORD.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Remetente e URL do frontend usada nos links de recuperação de senha.
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@wartmart.local}}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# JWT Configuration
# Use a long and secure key for real environments.
application.security.jwt.secret-key=${JWT_SECRET_KEY:suaChaveSecretaSuperLongaComPeloMenos256BitsParaHS256}
# Token expiration time in milliseconds.
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}
