spring.application.name=sistema-loja

# Spring reads the DB_URL environment variable.
# If it is not set, tests use the local PostgreSQL URL below.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gerenciamento_db}

# Spring reads the DB_USER environment variable.
spring.datasource.username=${DB_USER:admin}

# Spring reads the DB_PASSWORD environment variable.
spring.datasource.password=${DB_PASSWORD:suaSenhaSuperSecreta}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
# Use a long and secure key for real environments.
application.security.jwt.secret-key=${JWT_SECRET_KEY:suaChaveSecretaSuperLongaComPeloMenos256BitsParaHS256}
# Token expiration time in milliseconds.
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}
