services:
  postgres-db:
    image: postgres:16
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistema-loja-app
    restart: always
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres-db:
        condition: service_healthy

  jmeter:
    image: ${JMETER_IMAGE:-justb4/jmeter:5.6.3}
    profiles:
      - performance
    volumes:
      - ./performance/jmeter:/jmeter
    depends_on:
      - spring-app
    entrypoint: ["jmeter"]

volumes:
  pgdata:
